<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Stickman vs Zombies - Multiplayer</title>
    <style>
        /* Mobile-first responsive design */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #000;
            font-family: 'Helvetica', sans-serif;
            overflow: hidden;
        }
        
        #game-container {
            position: relative;
            background-color: #87CEEB;
            overflow: hidden;
            touch-action: none;
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            aspect-ratio: 9 / 16; /* Portrait-first */
        }
        
        @media (orientation: landscape) {
            #game-container {
                aspect-ratio: 16 / 9; /* Landscape support */
            }
        }
        
        #game-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Lobby Styles */
        #lobby-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
        }
        
        .lobby-title {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .lobby-buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 90%;
            max-width: 300px;
        }
        
        .lobby-btn {
            padding: 15px 25px;
            font-size: 1.2rem;
            border: 2px solid white;
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        
        .lobby-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }
        
        .lobby-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .room-panel {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            width: 90%;
            max-width: 400px;
        }
        
        .room-info {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        
        .player-list {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 1rem;
            width: 100%;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .player-item {
            padding: 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .ready-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 1rem 0;
        }
        
        /* Game UI Styles */
        #ui-container { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            right: 10px; 
            color: white; 
            font-size: 18px; 
            font-weight: bold; 
            text-shadow: 2px 2px 4px #000; 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
            pointer-events: none; 
            z-index: 10;
        }
        
        #player-stats { 
            display: flex; 
            flex-direction: column; 
            gap: 5px; 
        }
        
        #top-right-ui { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
        }
        
        #top-right-stats { 
            text-align: right; 
        }
        
        #coins { 
            color: #FFD700; 
        }
        
        #health-bar-container { 
            width: 120px; 
            height: 15px; 
            background-color: #555; 
            border: 2px solid white; 
            border-radius: 5px;
        }
        
        #health-bar { 
            width: 100%; 
            height: 100%; 
            background-color: #28a745; 
            transition: width 0.2s; 
            border-radius: 3px;
        }

        #pause-btn { 
            font-size: 24px; 
            font-weight: bold; 
            pointer-events: auto; 
            cursor: pointer; 
            user-select: none; 
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 5px;
        }

        /* Mobile Controls */
        #mobile-controls { 
            position: absolute; 
            bottom: 20px; 
            left: 20px; 
            right: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end; 
            opacity: 0.8; 
            pointer-events: none; 
        }
        
        .control-btn { 
            width: 60px; 
            height: 60px; 
            background-color: rgba(255, 255, 255, 0.7); 
            border: 2px solid white; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 24px; 
            font-weight: bold; 
            user-select: none; 
            pointer-events: auto; 
            cursor: pointer;
        }
        
        #joystick-base { 
            width: 120px; 
            height: 120px; 
            background-color: rgba(255, 255, 255, 0.3); 
            border: 2px solid white; 
            border-radius: 50%; 
            position: relative; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            pointer-events: auto; 
        }
        
        #joystick-thumb { 
            width: 50px; 
            height: 50px; 
            background-color: rgba(255, 255, 255, 0.8); 
            border-radius: 50%; 
            position: absolute; 
            transition: transform 0.1s; 
        }
        
        #right-controls { 
            display: flex; 
            align-items: flex-end; 
            gap: 10px; 
        }
        
        #dash-skill-ui { 
            position: relative; 
            width: 60px; 
            height: 60px; 
        }
        
        #btn-dash { 
            width: 60px; 
            height: 60px; 
            font-size: 20px; 
        }
        
        #dash-cooldown-overlay { 
            position: absolute; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            height: 0%; 
            background-color: rgba(0, 0, 0, 0.6); 
            border-radius: 50%; 
            pointer-events: none; 
            transition: height 0.1s linear; 
        }

        /* Multiplayer UI */
        #multiplayer-ui {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 10px;
            color: white;
            font-size: 14px;
        }
        
        .ping-indicator {
            color: #00ff00;
        }
        
        .ping-indicator.high {
            color: #ffaa00;
        }
        
        .ping-indicator.very-high {
            color: #ff0000;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        
        <!-- Lobby Screen -->
        <div id="lobby-screen">
            <h1 class="lobby-title">Stickman vs Zombies<br>Multiplayer</h1>
            <div class="lobby-buttons">
                <button id="btn-host" class="lobby-btn">Host Game — হোস্ট করুন</button>
                <button id="btn-join" class="lobby-btn">Join Room — রুম আইডি দিয়ে যোগ দিন</button>
                <button id="btn-quick" class="lobby-btn">Quick Match</button>
                <button id="btn-vs-cpu" class="lobby-btn">Play vs Computer — কম্পিউটারের সাথে খেলুন</button>
            </div>
            
            <div id="room-panel" class="room-panel">
                <div class="room-info" id="room-info">Room: Loading...</div>
                <div class="ready-toggle">
                    <input type="checkbox" id="toggle-ready">
                    <label for="toggle-ready">Ready — রেডি</label>
                </div>
                <div class="player-list" id="player-list"></div>
                <button id="btn-start" class="lobby-btn" disabled>Start Game</button>
            </div>
        </div>

        <!-- Game UI -->
        <div id="ui-container">
            <div id="player-stats">
                <div>Health:</div>
                <div id="health-bar-container"><div id="health-bar"></div></div>
            </div>
            <div id="top-right-ui">
                <div id="top-right-stats">
                    <div id="score">Score: 0</div>
                    <div id="coins">Coins: 0</div>
                </div>
                <div id="pause-btn">❚❚</div>
            </div>
        </div>

        <div id="multiplayer-ui">
            <div>Players: <span id="player-count">1</span></div>
            <div>Ping: <span id="ping" class="ping-indicator">--</span>ms</div>
        </div>

        <div id="mobile-controls">
            <div id="left-controls">
                <div id="joystick-base">
                    <div id="joystick-thumb"></div>
                </div>
            </div>
            <div id="right-controls">
                <div id="dash-skill-ui">
                    <div class="control-btn" id="btn-dash">💨</div>
                    <div id="dash-cooldown-overlay"></div>
                </div>
                <div class="control-btn" id="btn-shoot">🔫</div>
                <div class="control-btn" id="btn-jump">▲</div>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyD9CnMYRBWoA8D672iZhHFx3Sp3WyDfv1I",
            authDomain: "friand-chating.firebaseapp.com",
            databaseURL: "https://friand-chating-default-rtdb.firebaseio.com",
            projectId: "friand-chating",
            storageBucket: "friand-chating.firebasestorage.app",
            messagingSenderId: "638729970930",
            appId: "1:638729970930:web:5b3e1da45863ff63545c6b",
            measurementId: "G-E61C594F8F"
        };

        // Initialize Firebase
        if (!firebase.apps?.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // Game Variables
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        
        // Set canvas size based on container
        function resizeCanvas() {
            const container = document.getElementById('game-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Game State
        let gameState = 'lobby'; // 'lobby', 'playing', 'paused'
        let isHost = false;
        let currentRoomId = null;
        let myPlayerId = null;
        let players = new Map();
        let remotePlayers = new Map();
        let lastPingTime = 0;
        let ping = 0;

        // Game Objects
        const player = {
            x: 100, y: 350, width: 20, height: 60,
            dx: 0, dy: 0, speed: 4, jumpPower: -12,
            isJumping: false, health: 100, maxHealth: 100,
            direction: 'right', isInvincible: false,
            isDashing: false, dashTimer: 0, dashCooldown: 0, maxDashCooldown: 120,
            weapon: 'pistol', weaponTimer: 0, damageBoostTimer: 0
        };

        let platforms = [];
        let zombies = [];
        let bullets = [];
        let coins = [];
        let particles = [];
        let pickups = [];
        let score = 0;
        let sessionCoinCount = 0;
        let totalCoinCount = 0;
        let highScore = 0;

        // Camera
        const camera = { x: 0, y: 0, lerpFactor: 0.1, shakeDuration: 0, shakeIntensity: 0 };

        // Input
        const keys = { left: false, right: false, up: false, shoot: false, dash: false };
        let isJoystickActive = false;

        // Networking Functions
        function generateRoomId() {
            const animals = ['tiger','lion','eagle','panda','cobra','otter','shark','rhino','crane','wolf'];
            const colors = ['red','blue','green','gold','pink','cyan','violet','black','white','navy'];
            return `${colors[Math.floor(Math.random()*colors.length)]}-${animals[Math.floor(Math.random()*animals.length)]}-${Math.floor(Math.random()*900+100)}`;
        }

        async function hostRoom() {
            const roomId = generateRoomId();
            const user = firebase.auth().currentUser;
            
            await db.ref(`rooms/${roomId}`).set({
                hostId: user.uid,
                createdAt: firebase.database.ServerValue.TIMESTAMP,
                settings: { maxPlayers: 4, mode: 'deathmatch' },
                players: { [user.uid]: createPlayerData(user.uid) },
                events: {}
            });
            
            isHost = true;
            currentRoomId = roomId;
            myPlayerId = user.uid;
            setupOnDisconnect(roomId, user.uid);
            return roomId;
        }

        async function joinRoom(roomId) {
            const user = firebase.auth().currentUser;
            await db.ref(`rooms/${roomId}/players/${user.uid}`).set(createPlayerData(user.uid));
            
            isHost = false;
            currentRoomId = roomId;
            myPlayerId = user.uid;
            setupOnDisconnect(roomId, user.uid);
        }

        async function quickMatch() {
            const roomsSnap = await db.ref('rooms').once('value');
            const rooms = roomsSnap.val() || {};
            
            for (const [roomId, room] of Object.entries(rooms)) {
                const numPlayers = room.players ? Object.keys(room.players).length : 0;
                if (numPlayers < (room.settings?.maxPlayers || 4)) {
                    await joinRoom(roomId);
                    return roomId;
                }
            }
            return hostRoom();
        }

        function createPlayerData(playerId) {
            return {
                id: playerId,
                name: `Player-${playerId.substring(0, 4)}`,
                x: 100,
                y: 350,
                dx: 0,
                dy: 0,
                health: 100,
                lastTs: Date.now(),
                ready: false
            };
        }

        function setupOnDisconnect(roomId, playerId) {
            db.ref(`rooms/${roomId}/players/${playerId}`).onDisconnect().remove();
        }

        function publishPlayerState() {
            if (!currentRoomId || !myPlayerId) return;
            
            const state = {
                x: Math.round(player.x * 100) / 100,
                y: Math.round(player.y * 100) / 100,
                dx: Math.round(player.dx * 100) / 100,
                dy: Math.round(player.dy * 100) / 100,
                health: Math.round(player.health),
                lastTs: Date.now()
            };
            
            db.ref(`rooms/${currentRoomId}/players/${myPlayerId}`).update(state);
        }

        function listenToPlayers() {
            if (!currentRoomId) return;
            
            return db.ref(`rooms/${currentRoomId}/players`).on('value', (snap) => {
                const playersData = snap.val() || {};
                remotePlayers.clear();
                
                Object.values(playersData).forEach(p => {
                    if (p.id !== myPlayerId) {
                        remotePlayers.set(p.id, p);
                    }
                });
                
                updatePlayerCount(Object.keys(playersData).length);
            });
        }

        function broadcastEvent(event) {
            if (!currentRoomId || !isHost) return;
            
            const eventRef = db.ref(`rooms/${currentRoomId}/events`).push();
            eventRef.set({
                ...event,
                ts: Date.now()
            });
        }

        function listenToEvents() {
            if (!currentRoomId) return;
            
            return db.ref(`rooms/${currentRoomId}/events`).on('child_added', (snap) => {
                const event = snap.val();
                handleGameEvent(event);
            });
        }

        function handleGameEvent(event) {
            switch (event.type) {
                case 'zombie_spawn':
                    zombies.push(event.data);
                    break;
                case 'coin_pickup':
                    const coinIndex = coins.findIndex(c => c.id === event.data.id);
                    if (coinIndex >= 0) {
                        coins.splice(coinIndex, 1);
                        if (event.data.playerId === myPlayerId) {
                            sessionCoinCount++;
                            totalCoinCount++;
                            updateUI();
                        }
                    }
                    break;
                case 'pickup_spawn':
                    pickups.push(event.data);
                    break;
            }
        }

        function updatePlayerCount(count) {
            document.getElementById('player-count').textContent = count;
        }

        function updatePing() {
            const now = Date.now();
            if (lastPingTime > 0) {
                ping = now - lastPingTime;
                const pingEl = document.getElementById('ping');
                pingEl.textContent = ping;
                pingEl.className = 'ping-indicator';
                if (ping > 200) pingEl.className += ' high';
                if (ping > 500) pingEl.className += ' very-high';
            }
            lastPingTime = now;
        }

        // Game Logic
        function generateWorld() {
            platforms = [];
            platforms.push({ x: 0, y: canvas.height - 40, width: 4000, height: 40 });
            
            let currentX = 150;
            while (currentX < 4000 - 300) {
                if (Math.random() > 0.1) {
                    const platY = 200 + Math.random() * 150;
                    const platWidth = 100 + Math.random() * 150;
                    platforms.push({ x: currentX, y: platY, width: platWidth, height: 20 });
                }
                currentX += 200 + Math.random() * 200;
            }
        }

        function updatePlayer() {
            if (player.isDashing) {
                player.dashTimer--;
                const dashSpeed = 20;
                player.dx = player.direction === 'right' ? dashSpeed : -dashSpeed;
                player.isInvincible = true;
                if (player.dashTimer <= 0) {
                    player.isDashing = false;
                    player.isInvincible = false;
                }
            } else {
                player.dx = 0;
                if (keys.left) { player.dx = -player.speed; player.direction = 'left'; }
                if (keys.right) { player.dx = player.speed; player.direction = 'right'; }
            }

            if (keys.up && !player.isJumping && !player.isDashing) {
                player.dy = player.jumpPower;
                player.isJumping = true;
            }
            
            player.dashCooldown = Math.max(0, player.dashCooldown - 1);
            if (keys.dash && player.dashCooldown <= 0 && !player.isDashing) {
                player.isDashing = true;
                player.dashTimer = 10;
                player.dashCooldown = player.maxDashCooldown;
                player.dy = 0;
            }
            
            player.x += player.dx;
            player.y += player.dy;
            player.dy += 0.5; // gravity
            
            // Platform collision
            platforms.forEach(p => {
                if (player.x + player.width / 2 > p.x && player.x - player.width / 2 < p.x + p.width && 
                    player.y + player.height > p.y && player.y + player.height < p.y + p.height + player.dy) {
                    player.dy = 0;
                    player.y = p.y - player.height;
                    player.isJumping = false;
                }
            });
            
            player.x = Math.max(player.width/2, Math.min(player.x, 4000 - player.width/2));
            
            if (player.y > canvas.height) {
                gameState = 'gameOver';
            }
        }

        function updateZombies() {
            zombies.forEach(z => {
                if (z.x < player.x) z.x += z.speed;
                if (z.x > player.x) z.x -= z.speed;
            });
        }

        function spawnZombie() {
            if (!isHost) return;
            
            const spawnEdge = Math.random() < 0.5 ? camera.x - 50 : camera.x + canvas.width + 50;
            const speed = 1 + Math.random() + (score / 150);
            const zombie = {
                id: Date.now() + Math.random(),
                type: score > 150 && Math.random() < 0.15 ? 'brute' : 'normal',
                x: spawnEdge,
                y: score > 150 && Math.random() < 0.15 ? 340 : 350,
                width: score > 150 && Math.random() < 0.15 ? 30 : 20,
                height: score > 150 && Math.random() < 0.15 ? 70 : 60,
                speed: speed * (score > 150 && Math.random() < 0.15 ? 0.7 : 1),
                health: score > 150 && Math.random() < 0.15 ? 300 : 100,
                maxHealth: score > 150 && Math.random() < 0.15 ? 300 : 100
            };
            
            zombies.push(zombie);
            broadcastEvent({ type: 'zombie_spawn', data: zombie });
        }

        function updateBullets() {
            bullets.forEach((b, i) => {
                b.x += b.dx;
                b.y += b.dy;
                if (b.x > 4000 || b.x < 0) bullets.splice(i, 1);
            });
        }

        function shootBullet() {
            const bullet = {
                x: player.x,
                y: player.y + 15,
                width: 10,
                height: 4,
                dx: player.direction === 'right' ? 10 : -10,
                dy: 0,
                damage: 51
            };
            bullets.push(bullet);
        }

        function updateCoins() {
            coins.forEach(c => {
                c.dy += 0.25;
                c.y += c.dy;
                platforms.forEach(p => {
                    if (c.x > p.x && c.x < p.x + p.width && c.y + c.radius > p.y && c.y + c.radius < p.y + p.height + c.dy) {
                        c.dy = 0;
                        c.y = p.y - c.radius;
                    }
                });
            });
        }

        function spawnCoin(x, y) {
            const coin = {
                id: Date.now() + Math.random(),
                x: x,
                y: y,
                radius: 8,
                dy: -2 - Math.random() * 2
            };
            coins.push(coin);
        }

        function checkCollisions() {
            bullets.forEach((bullet, bIndex) => {
                zombies.forEach((zombie, zIndex) => {
                    if (bullet.x < zombie.x + zombie.width && bullet.x + bullet.width > zombie.x && 
                        bullet.y < zombie.y + zombie.height && bullet.y + bullet.height > zombie.y) {
                        bullets.splice(bIndex, 1);
                        zombie.health -= bullet.damage;
                        
                        if (zombie.health <= 0) {
                            for (let i = 0; i < 3; i++) {
                                spawnCoin(zombie.x + (Math.random() - 0.5) * 20, zombie.y);
                            }
                            zombies.splice(zIndex, 1);
                            score += zombie.type === 'brute' ? 50 : 10;
                            updateUI();
                        }
                    }
                });
            });

            if (!player.isInvincible) {
                zombies.forEach(zombie => {
                    if (Math.abs(player.x - zombie.x) < (player.width + zombie.width) / 2 && 
                        Math.abs(player.y - zombie.y) < (player.height + zombie.height) / 2) {
                        player.health -= zombie.type === 'brute' ? 1.5 : 0.75;
                        if (player.health <= 0) {
                            player.health = 0;
                            gameState = 'gameOver';
                        }
                        updateUI();
                    }
                });
            }

            coins.forEach((coin, index) => {
                const dist = Math.hypot(player.x - coin.x, player.y + player.height/2 - coin.y);
                if (dist < player.width/2 + coin.radius + 20) {
                    coins.splice(index, 1);
                    sessionCoinCount++;
                    totalCoinCount++;
                    updateUI();
                    
                    if (isHost) {
                        broadcastEvent({ type: 'coin_pickup', data: { id: coin.id, playerId: myPlayerId } });
                    }
                }
            });
        }

        function updateUI() {
            document.getElementById('score').textContent = `Score: ${score}`;
            document.getElementById('coins').textContent = `Coins: ${sessionCoinCount}`;
            document.getElementById('health-bar').style.width = `${(player.health / player.maxHealth) * 100}%`;
        }

        // Drawing Functions
        function drawPlayer() {
            ctx.fillStyle = '#FF0000';
            ctx.fillRect(player.x - player.width/2, player.y - player.height, player.width, player.height);
            
            // Draw head
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(player.x, player.y - player.height - 10, 10, 0, Math.PI * 2);
            ctx.fill();
            
            // Draw arms
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 4;
            ctx.beginPath();
            if (player.direction === 'right') {
                ctx.moveTo(player.x, player.y - player.height + 15);
                ctx.lineTo(player.x + 15, player.y - player.height + 25);
            } else {
                ctx.moveTo(player.x, player.y - player.height + 15);
                ctx.lineTo(player.x - 15, player.y - player.height + 25);
            }
            ctx.stroke();
            
            // Draw legs
            ctx.beginPath();
            ctx.moveTo(player.x, player.y - 20);
            ctx.lineTo(player.x - 8, player.y);
            ctx.moveTo(player.x, player.y - 20);
            ctx.lineTo(player.x + 8, player.y);
            ctx.stroke();
        }

        function drawRemotePlayers() {
            ctx.fillStyle = '#00FF00';
            remotePlayers.forEach(p => {
                ctx.fillRect(p.x - 10, p.y - 30, 20, 30);
                
                // Draw head
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(p.x, p.y - 40, 10, 0, Math.PI * 2);
                ctx.fill();
                
                // Draw name
                ctx.fillStyle = '#fff';
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(p.name || p.id.substring(0, 4), p.x, p.y - 50);
            });
        }

        function drawPlatforms() {
            ctx.fillStyle = '#654321';
            platforms.forEach(p => {
                ctx.fillRect(p.x, p.y, p.width, p.height);
            });
        }

        function drawZombies() {
            ctx.fillStyle = '#556B2F';
            zombies.forEach(z => {
                ctx.fillRect(z.x - z.width/2, z.y - z.height, z.width, z.height);
                
                // Health bar
                const barWidth = z.width * 2;
                ctx.fillStyle = '#555';
                ctx.fillRect(z.x - barWidth/2, z.y - 30, barWidth, 5);
                ctx.fillStyle = '#dc3545';
                ctx.fillRect(z.x - barWidth/2, z.y - 30, barWidth * (z.health / z.maxHealth), 5);
            });
        }

        function drawBullets() {
            ctx.fillStyle = '#FFFF00';
            bullets.forEach(b => {
                ctx.fillRect(b.x, b.y, b.width, b.height);
            });
        }

        function drawCoins() {
            coins.forEach(c => {
                ctx.fillStyle = '#FFD700';
                ctx.strokeStyle = '#DAA520';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(c.x, c.y, c.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
            });
        }

        // Input Handling
        function setupInput() {
            // Keyboard
            window.addEventListener('keydown', (e) => {
                if (gameState !== 'playing') return;
                if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
                if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
                if (e.code === 'ArrowUp' || e.code === 'KeyW') keys.up = true;
                if (e.code === 'Space') { e.preventDefault(); keys.shoot = true; }
                if (e.code === 'ShiftLeft' || e.code === 'KeyE') { e.preventDefault(); keys.dash = true; }
            });

            window.addEventListener('keyup', (e) => {
                if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
                if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
                if (e.code === 'ArrowUp' || e.code === 'KeyW') keys.up = false;
                if (e.code === 'Space') keys.shoot = false;
                if (e.code === 'ShiftLeft' || e.code === 'KeyE') keys.dash = false;
            });

            // Touch controls
            const btnJump = document.getElementById('btn-jump');
            const btnShoot = document.getElementById('btn-shoot');
            const btnDash = document.getElementById('btn-dash');

            btnJump.addEventListener('touchstart', (e) => { e.preventDefault(); keys.up = true; });
            btnJump.addEventListener('touchend', (e) => { e.preventDefault(); keys.up = false; });
            btnShoot.addEventListener('touchstart', (e) => { e.preventDefault(); keys.shoot = true; });
            btnShoot.addEventListener('touchend', (e) => { e.preventDefault(); keys.shoot = false; });
            btnDash.addEventListener('touchstart', (e) => { e.preventDefault(); keys.dash = true; });
            btnDash.addEventListener('touchend', (e) => { e.preventDefault(); keys.dash = false; });

            // Joystick
            const joystickBase = document.getElementById('joystick-base');
            const joystickThumb = document.getElementById('joystick-thumb');
            const joystickMaxRadius = joystickBase.offsetWidth / 2 - joystickThumb.offsetWidth / 4;

            function handleJoystick(e) {
                e.preventDefault();
                if (gameState !== 'playing') return;
                const rect = joystickBase.getBoundingClientRect();
                const touch = e.touches[0];
                const x = touch.clientX - rect.left - joystickBase.offsetWidth / 2;
                const y = touch.clientY - rect.top - joystickBase.offsetHeight / 2;
                const distance = Math.min(joystickMaxRadius, Math.sqrt(x*x + y*y));
                const angle = Math.atan2(y, x);
                const thumbX = distance * Math.cos(angle);
                const thumbY = distance * Math.sin(angle);
                joystickThumb.style.transform = `translate(${thumbX}px, ${thumbY}px)`;
                
                const deadzone = 10;
                if (thumbX > deadzone) { keys.right = true; keys.left = false; }
                else if (thumbX < -deadzone) { keys.left = true; keys.right = false; }
                else { keys.left = false; keys.right = false; }
            }

            joystickBase.addEventListener('touchstart', (e) => { isJoystickActive = true; handleJoystick(e); });
            joystickBase.addEventListener('touchmove', (e) => { if(isJoystickActive) handleJoystick(e); });
            joystickBase.addEventListener('touchend', (e) => { 
                isJoystickActive = false; 
                joystickThumb.style.transform = 'translate(0, 0)'; 
                keys.left = false; 
                keys.right = false; 
            });
        }

        // Lobby Functions
        function setupLobby() {
            document.getElementById('btn-host').onclick = async () => {
                try {
                    const roomId = await hostRoom();
                    showRoomPanel(roomId);
                } catch (e) {
                    alert('Failed to create room: ' + e.message);
                }
            };

            document.getElementById('btn-join').onclick = async () => {
                const roomId = prompt('Enter Room ID:');
                if (!roomId) return;
                try {
                    await joinRoom(roomId);
                    showRoomPanel(roomId);
                } catch (e) {
                    alert('Failed to join room: ' + e.message);
                }
            };

            document.getElementById('btn-quick').onclick = async () => {
                try {
                    const roomId = await quickMatch();
                    showRoomPanel(roomId);
                } catch (e) {
                    alert('Failed to find room: ' + e.message);
                }
            };

            document.getElementById('btn-vs-cpu').onclick = () => {
                startSinglePlayer();
            };

            document.getElementById('toggle-ready').onchange = (e) => {
                if (currentRoomId) {
                    db.ref(`rooms/${currentRoomId}/players/${myPlayerId}/ready`).set(e.target.checked);
                }
            };

            document.getElementById('btn-start').onclick = () => {
                if (currentRoomId && isHost) {
                    startMultiplayerGame();
                }
            };
        }

        function showRoomPanel(roomId) {
            document.getElementById('room-info').textContent = `Room: ${roomId}`;
            document.getElementById('room-panel').style.display = 'flex';
            document.getElementById('lobby-buttons').style.display = 'none';
            
            // Listen to players
            db.ref(`rooms/${roomId}/players`).on('value', (snap) => {
                const playersData = snap.val() || {};
                const playerList = document.getElementById('player-list');
                playerList.innerHTML = '';
                
                Object.values(playersData).forEach(p => {
                    const li = document.createElement('div');
                    li.className = 'player-item';
                    li.innerHTML = `
                        <span>${p.name || p.id.substring(0, 8)}</span>
                        <span>${p.ready ? '✅' : '⏳'}</span>
                    `;
                    playerList.appendChild(li);
                });
                
                const count = Object.keys(playersData).length;
                const allReady = Object.values(playersData).every(p => p.ready);
                document.getElementById('btn-start').disabled = !isHost || count < 2 || !allReady;
            });
        }

        function startMultiplayerGame() {
            document.getElementById('lobby-screen').style.display = 'none';
            gameState = 'playing';
            generateWorld();
            updateUI();
            
            // Start networking
            listenToPlayers();
            listenToEvents();
            
            // Start game loop
            gameLoop();
        }

        function startSinglePlayer() {
            document.getElementById('lobby-screen').style.display = 'none';
            gameState = 'playing';
            isHost = true;
            currentRoomId = null;
            myPlayerId = 'single-player';
            generateWorld();
            updateUI();
            gameLoop();
        }

        // Game Loop
        let lastTime = 0;
        let zombieSpawnTimer = 0;
        let lastPublishTime = 0;

        function gameLoop(currentTime = 0) {
            if (gameState !== 'playing') return;

            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;

            // Update game logic
            updatePlayer();
            updateZombies();
            updateBullets();
            updateCoins();
            checkCollisions();

            // Spawn zombies (host only)
            if (isHost) {
                zombieSpawnTimer++;
                if (zombieSpawnTimer > 180 - (score / 25)) {
                    spawnZombie();
                    zombieSpawnTimer = 0;
                }
            }

            // Shoot bullets
            if (keys.shoot && currentTime - lastPublishTime > 200) {
                shootBullet();
                lastPublishTime = currentTime;
            }

            // Publish player state (10 Hz)
            if (currentTime - lastPublishTime > 100) {
                publishPlayerState();
                updatePing();
                lastPublishTime = currentTime;
            }

            // Update camera
            camera.x += (player.x - canvas.width / 2 - camera.x) * camera.lerpFactor;
            camera.x = Math.max(0, Math.min(camera.x, 4000 - canvas.width));

            // Draw everything
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Background
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Translate for camera
            ctx.save();
            ctx.translate(-camera.x, 0);
            
            drawPlatforms();
            drawCoins();
            drawZombies();
            drawBullets();
            drawPlayer();
            drawRemotePlayers();
            
            ctx.restore();

            requestAnimationFrame(gameLoop);
        }

        // Initialize
        async function init() {
            try {
                // Sign in anonymously
                await firebase.auth().signInAnonymously();
                myPlayerId = firebase.auth().currentUser.uid;
                
                setupInput();
                setupLobby();
                
                console.log('Multiplayer game initialized');
            } catch (error) {
                console.error('Failed to initialize:', error);
                alert('Failed to connect to server. Please refresh and try again.');
            }
        }

        // Start the game
        init();
    </script>
</body>
</html>
