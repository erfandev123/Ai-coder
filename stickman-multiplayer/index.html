<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Stickman vs Zombies - Multiplayer Demo</title>
  <style>
    body{margin:0;background:#000;color:#fff;font-family:Helvetica,Arial,sans-serif}
    #root{position:fixed;inset:0;display:flex;flex-direction:column}
    #lobby{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:16px}
    #buttons-panel{display:flex;flex-direction:column;gap:10px;width:90%;max-width:360px}
    .btn{padding:14px 18px;border:2px solid #fff;background:#17a2b8;color:#fff;border-radius:10px;font-size:18px;cursor:pointer}
    .btn:disabled{opacity:.6}
    #room-panel{display:none;gap:10px;align-items:center;justify-content:center;flex-direction:column;width:90%;max-width:420px;margin-top:10px}
    ul{list-style:none;padding:0;margin:0;width:100%;background:rgba(255,255,255,.06);border-radius:8px}
    li{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.1)}
    #game{flex:1;display:none}
    #game canvas{width:100%;height:100%}
    .row{display:flex;align-items:center;gap:10px}
    label{display:flex;align-items:center;gap:8px}
  </style>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
  <div id="root">
    <section id="lobby">
      <h2>Stickman vs Zombies — Multiplayer</h2>
      <div id="buttons-panel">
        <button id="btn-host" class="btn">Host Game — হোস্ট করুন</button>
        <button id="btn-join" class="btn">Join Room — রুম আইডি দিয়ে যোগ দিন</button>
        <button id="btn-quick" class="btn">Quick Match</button>
        <button id="btn-vs-cpu" class="btn">Play vs Computer — কম্পিউটারের সাথে খেলুন</button>
      </div>
      <div id="room-panel">
        <div class="row"><strong id="room-info"></strong></div>
        <label><input type="checkbox" id="toggle-ready"> Ready — রেডি</label>
        <ul id="player-list"></ul>
        <button id="btn-start" class="btn" disabled>Start Game</button>
      </div>
    </section>
    <section id="game">
      <canvas id="game-canvas"></canvas>
    </section>
  </div>

  <script type="module">
    import { initFirebase } from './js/firebase-init.js';
    import { initLobbyUI } from './js/lobby.js';
    import { startMultiplayer } from './js/multiplayer.js';

    // Minimal stub to integrate with your existing single-player game
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 540; // portrait-first
    canvas.height = 960;

    const local = { id: null, x: 100, y: 350, dx: 0, dy: 0, health: 100 };
    const remotes = new Map();
    let net = null;

    function getSelfId(){ return local.id; }
    function getLocalState(){ return { x: local.x, y: local.y, dx: local.dx, dy: local.dy, health: local.health }; }
    function applyRemotePlayers(map){
      remotes.clear();
      Object.entries(map).forEach(([id, s]) => remotes.set(id, s));
    }
    function onEvent(e){ /* handle shared events if needed */ }
    function onSessionEnd(coins){ /* credit handled in backend demo */ }

    function loop(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      // draw local
      ctx.fillStyle = '#fff';
      ctx.fillRect(local.x - 10, local.y - 20, 20, 40);
      // draw remotes
      ctx.fillStyle = '#0f0';
      remotes.forEach(s => ctx.fillRect(s.x - 10, s.y - 20, 20, 40));
      requestAnimationFrame(loop);
    }
    loop();

    // Simple input for demo
    window.addEventListener('keydown', e => {
      if (e.code === 'ArrowLeft') local.dx = -3;
      if (e.code === 'ArrowRight') local.dx = 3;
      if (e.code === 'ArrowUp') local.dy = -3;
      if (e.code === 'ArrowDown') local.dy = 3;
    });
    window.addEventListener('keyup', e => {
      if (['ArrowLeft','ArrowRight'].includes(e.code)) local.dx = 0;
      if (['ArrowUp','ArrowDown'].includes(e.code)) local.dy = 0;
    });
    setInterval(() => { local.x += local.dx; local.y += local.dy; }, 16);

    await initFirebase();
    local.id = firebase.auth().currentUser.uid;

    initLobbyUI({
      onEnterRoom: (roomId) => {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game').style.display = 'block';
        net = startMultiplayer(roomId, { getSelfId, getLocalState, applyRemotePlayers, onEvent, onSessionEnd });
      },
      onPlayVsComputer: () => {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game').style.display = 'block';
        // local only
      }
    });
  </script>
</body>
</html>
