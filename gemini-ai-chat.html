<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Pro AI - Powerful Chat & Code Assistant</title>
    
    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root {
            --primary-bg: #0f0f23;
            --secondary-bg: #1a1a2e;
            --card-bg: #16213e;
            --accent-color: #4f46e5;
            --accent-hover: #6366f1;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --border-color: #2d3748;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --code-bg: #1e1e1e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--primary-bg) 0%, var(--secondary-bg) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* Mode Selector */
        .mode-selector {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            gap: 10px;
        }

        .mode-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .mode-btn.active {
            background: var(--accent-color);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 70, 229, 0.3);
        }

        .mode-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        /* Main Content */
        .main-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
            min-height: 70vh;
        }

        /* Chat Mode */
        .chat-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }

        .chat-container.active {
            display: block;
        }

        .chat-messages {
            max-height: 500px;
            overflow-y: auto;
            margin-bottom: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
        }

        .message {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 15px;
            animation: fadeInUp 0.3s ease;
        }

        .message.user {
            background: linear-gradient(135deg, var(--accent-color), var(--accent-hover));
            margin-left: 20%;
            text-align: right;
        }

        .message.ai {
            background: rgba(255, 255, 255, 0.1);
            margin-right: 20%;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .message-content {
            line-height: 1.6;
        }

        .message-content pre {
            background: var(--code-bg);
            padding: 15px;
            border-radius: 10px;
            overflow-x: auto;
            margin: 10px 0;
            border: 1px solid var(--border-color);
        }

        .message-content code {
            background: var(--code-bg);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Fira Code', monospace;
        }

        .chat-input-container {
            display: flex;
            gap: 15px;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            font-size: 1rem;
            resize: none;
            min-height: 60px;
            max-height: 120px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .send-btn {
            padding: 15px 25px;
            border: none;
            border-radius: 15px;
            background: var(--accent-color);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 100px;
        }

        .send-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 70, 229, 0.3);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Code Mode */
        .code-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }

        .code-container.active {
            display: block;
        }

        .code-input-container {
            margin-bottom: 20px;
        }

        .code-input-label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .code-input {
            width: 100%;
            padding: 15px 20px;
            border: none;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            font-size: 1rem;
            resize: vertical;
            min-height: 120px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-family: 'Fira Code', monospace;
        }

        .code-input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .code-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .option-group {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .option-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .option-group select,
        .option-group input {
            width: 100%;
            padding: 10px 15px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .generate-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(135deg, var(--accent-color), var(--accent-hover));
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .generate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(79, 70, 229, 0.4);
        }

        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Code Output */
        .code-output {
            margin-top: 30px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }

        .code-output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .code-output-title {
            font-weight: 600;
            color: var(--text-secondary);
        }

        .copy-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .code-output-content {
            background: var(--code-bg);
            padding: 20px;
            border-radius: 10px;
            overflow-x: auto;
            border: 1px solid var(--border-color);
        }

        .code-output-content pre {
            margin: 0;
            color: var(--text-primary);
            font-family: 'Fira Code', monospace;
            line-height: 1.5;
        }

        /* Loading States */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .mode-selector {
                flex-direction: column;
                align-items: center;
            }
            
            .mode-btn {
                width: 100%;
                max-width: 300px;
            }
            
            .chat-container,
            .code-container {
                padding: 20px;
            }
            
            .message.user,
            .message.ai {
                margin-left: 0;
                margin-right: 0;
            }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1><i class="fas fa-robot"></i> Gemini Pro AI</h1>
            <p>Powerful AI Assistant for Chat & Code Generation</p>
        </div>

        <!-- Mode Selector -->
        <div class="mode-selector">
            <button class="mode-btn active" data-mode="chat">
                <i class="fas fa-comments"></i> Chat Mode
            </button>
            <button class="mode-btn" data-mode="code">
                <i class="fas fa-code"></i> Code Generation
            </button>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Chat Mode -->
            <div class="chat-container active" id="chat-container">
                <div class="chat-messages" id="chat-messages">
                    <div class="message ai">
                        <div class="message-content">
                            <i class="fas fa-robot"></i> Hello! I'm Gemini Pro AI, your powerful assistant. I can help you with conversations, code generation, problem-solving, and much more. What would you like to discuss today?
                        </div>
                    </div>
                </div>
                
                <div class="chat-input-container">
                    <textarea 
                        class="chat-input" 
                        id="chat-input" 
                        placeholder="Type your message here... (Press Enter to send, Shift+Enter for new line)"
                        rows="3"
                    ></textarea>
                    <button class="send-btn" id="send-btn">
                        <i class="fas fa-paper-plane"></i> Send
                    </button>
                </div>
            </div>

            <!-- Code Generation Mode -->
            <div class="code-container" id="code-container">
                <div class="code-input-container">
                    <label class="code-input-label" for="code-input">
                        <i class="fas fa-lightbulb"></i> Describe what you want me to code:
                    </label>
                    <textarea 
                        class="code-input" 
                        id="code-input" 
                        placeholder="Example: Create a React component for a todo list with add, delete, and mark as complete functionality..."
                        rows="5"
                    ></textarea>
                </div>

                <div class="code-options">
                    <div class="option-group">
                        <label for="language-select">Programming Language:</label>
                        <select id="language-select">
                            <option value="javascript">JavaScript</option>
                            <option value="python">Python</option>
                            <option value="java">Java</option>
                            <option value="cpp">C++</option>
                            <option value="csharp">C#</option>
                            <option value="php">PHP</option>
                            <option value="ruby">Ruby</option>
                            <option value="go">Go</option>
                            <option value="rust">Rust</option>
                            <option value="swift">Swift</option>
                            <option value="kotlin">Kotlin</option>
                            <option value="typescript">TypeScript</option>
                            <option value="html">HTML/CSS</option>
                            <option value="sql">SQL</option>
                        </select>
                    </div>

                    <div class="option-group">
                        <label for="framework-select">Framework (if applicable):</label>
                        <select id="framework-select">
                            <option value="">None</option>
                            <option value="react">React</option>
                            <option value="vue">Vue.js</option>
                            <option value="angular">Angular</option>
                            <option value="node">Node.js</option>
                            <option value="express">Express.js</option>
                            <option value="django">Django</option>
                            <option value="flask">Flask</option>
                            <option value="spring">Spring Boot</option>
                            <option value="dotnet">.NET</option>
                            <option value="laravel">Laravel</option>
                        </select>
                    </div>

                    <div class="option-group">
                        <label for="complexity-select">Code Complexity:</label>
                        <select id="complexity-select">
                            <option value="simple">Simple</option>
                            <option value="medium" selected>Medium</option>
                            <option value="complex">Complex</option>
                            <option value="expert">Expert Level</option>
                        </select>
                    </div>

                    <div class="option-group">
                        <label for="include-tests">Include Tests:</label>
                        <select id="include-tests">
                            <option value="false">No</option>
                            <option value="true">Yes</option>
                        </select>
                    </div>
                </div>

                <button class="generate-btn" id="generate-btn">
                    <i class="fas fa-magic"></i> Generate Code
                </button>

                <div class="code-output" id="code-output" style="display: none;">
                    <div class="code-output-header">
                        <span class="code-output-title">Generated Code</span>
                        <button class="copy-btn" id="copy-btn">
                            <i class="fas fa-copy"></i> Copy
                        </button>
                    </div>
                    <div class="code-output-content">
                        <pre id="code-output-content"></pre>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Gemini Pro API Configuration
        const GEMINI_API_KEY = 'AIzaSyA3Q2QKe3pUQkBvscEHYECUfU4l58GWoKQ';
        const GEMINI_API_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent';

        // DOM Elements
        const modeBtns = document.querySelectorAll('.mode-btn');
        const chatContainer = document.getElementById('chat-container');
        const codeContainer = document.getElementById('code-container');
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const codeInput = document.getElementById('code-input');
        const generateBtn = document.getElementById('generate-btn');
        const codeOutput = document.getElementById('code-output');
        const codeOutputContent = document.getElementById('code-output-content');
        const copyBtn = document.getElementById('copy-btn');

        // Chat History
        let chatHistory = [];

        // Mode Switching
        modeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const mode = btn.dataset.mode;
                
                // Update active button
                modeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                // Show/hide containers
                if (mode === 'chat') {
                    chatContainer.classList.add('active');
                    codeContainer.classList.remove('active');
                } else {
                    codeContainer.classList.add('active');
                    chatContainer.classList.remove('active');
                }
            });
        });

        // Chat Functionality
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message) return;

            // Add user message to chat
            addMessage(message, 'user');
            chatInput.value = '';

            // Show loading state
            const loadingId = addLoadingMessage();

            try {
                // Prepare conversation history for Gemini
                const conversationHistory = chatHistory.map(msg => ({
                    role: msg.role === 'user' ? 'user' : 'model',
                    parts: [{ text: msg.content }]
                }));

                // Add current user message
                conversationHistory.push({
                    role: 'user',
                    parts: [{ text: message }]
                });

                const response = await fetch(`${GEMINI_API_URL}?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        contents: conversationHistory,
                        generationConfig: {
                            temperature: 0.7,
                            topK: 40,
                            topP: 0.95,
                            maxOutputTokens: 2048,
                        },
                        safetySettings: [
                            {
                                category: "HARM_CATEGORY_HARASSMENT",
                                threshold: "BLOCK_MEDIUM_AND_ABOVE"
                            },
                            {
                                category: "HARM_CATEGORY_HATE_SPEECH",
                                threshold: "BLOCK_MEDIUM_AND_ABOVE"
                            },
                            {
                                category: "HARM_CATEGORY_SEXUALLY_EXPLICIT",
                                threshold: "BLOCK_MEDIUM_AND_ABOVE"
                            },
                            {
                                category: "HARM_CATEGORY_DANGEROUS_CONTENT",
                                threshold: "BLOCK_MEDIUM_AND_ABOVE"
                            }
                        ]
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                
                if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                    const aiResponse = data.candidates[0].content.parts[0].text;
                    
                    // Remove loading message
                    removeLoadingMessage(loadingId);
                    
                    // Add AI response
                    addMessage(aiResponse, 'ai');
                    
                    // Update chat history
                    chatHistory.push(
                        { role: 'user', content: message },
                        { role: 'assistant', content: aiResponse }
                    );
                } else {
                    throw new Error('Invalid response format from Gemini API');
                }

            } catch (error) {
                console.error('Error:', error);
                removeLoadingMessage(loadingId);
                addMessage(`Sorry, I encountered an error: ${error.message}`, 'ai');
            }
        }

        function addMessage(content, role) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            // Process markdown and code highlighting
            const processedContent = processMarkdown(content);
            messageDiv.innerHTML = `<div class="message-content">${processedContent}</div>`;
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addLoadingMessage() {
            const loadingDiv = document.createElement('div');
            const id = 'loading-' + Date.now();
            loadingDiv.id = id;
            loadingDiv.className = 'message ai';
            loadingDiv.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    Thinking...
                </div>
            `;
            chatMessages.appendChild(loadingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return id;
        }

        function removeLoadingMessage(id) {
            const loadingDiv = document.getElementById(id);
            if (loadingDiv) {
                loadingDiv.remove();
            }
        }

        function processMarkdown(text) {
            // Convert markdown to HTML
            let html = marked.parse(text);
            
            // Apply syntax highlighting to code blocks
            html = html.replace(/<pre><code class="language-(\w+)">/g, '<pre><code class="language-$1">');
            html = html.replace(/<pre><code>/g, '<pre><code class="language-plaintext">');
            
            return html;
        }

        // Code Generation Functionality
        generateBtn.addEventListener('click', generateCode);

        async function generateCode() {
            const description = codeInput.value.trim();
            if (!description) {
                alert('Please describe what code you want me to generate!');
                return;
            }

            const language = document.getElementById('language-select').value;
            const framework = document.getElementById('framework-select').value;
            const complexity = document.getElementById('complexity-select').value;
            const includeTests = document.getElementById('include-tests').value === 'true';

            // Show loading state
            generateBtn.disabled = true;
            generateBtn.innerHTML = '<div class="spinner"></div> Generating...';

            try {
                // Create detailed prompt for code generation
                let prompt = `Generate ${complexity} level ${language} code for the following request: "${description}"`;
                
                if (framework) {
                    prompt += `\n\nUse ${framework} framework.`;
                }
                
                prompt += `\n\nRequirements:
                - Language: ${language}
                - Complexity: ${complexity}
                - Include comprehensive comments explaining the code
                - Follow best practices and coding standards
                - Make the code production-ready
                - Include error handling where appropriate`;
                
                if (includeTests) {
                    prompt += `\n- Include unit tests for the main functionality`;
                }
                
                prompt += `\n\nPlease provide the complete code with proper formatting and syntax highlighting.`;

                // Prepare conversation for Gemini
                const conversationHistory = [
                    {
                        role: 'user',
                        parts: [{ text: prompt }]
                    }
                ];

                const response = await fetch(`${GEMINI_API_URL}?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        contents: conversationHistory,
                        generationConfig: {
                            temperature: 0.3,
                            topK: 40,
                            topP: 0.95,
                            maxOutputTokens: 4096,
                        },
                        safetySettings: [
                            {
                                category: "HARM_CATEGORY_HARASSMENT",
                                threshold: "BLOCK_MEDIUM_AND_ABOVE"
                            },
                            {
                                category: "HARM_CATEGORY_HATE_SPEECH",
                                threshold: "BLOCK_MEDIUM_AND_ABOVE"
                            },
                            {
                                category: "HARM_CATEGORY_SEXUALLY_EXPLICIT",
                                threshold: "BLOCK_MEDIUM_AND_ABOVE"
                            },
                            {
                                category: "HARM_CATEGORY_DANGEROUS_CONTENT",
                                threshold: "BLOCK_MEDIUM_AND_ABOVE"
                            }
                        ]
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                
                if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                    const generatedCode = data.candidates[0].content.parts[0].text;
                    
                    // Display the generated code
                    codeOutputContent.textContent = generatedCode;
                    codeOutput.style.display = 'block';
                    
                    // Apply syntax highlighting
                    hljs.highlightElement(codeOutputContent);
                    
                    // Scroll to output
                    codeOutput.scrollIntoView({ behavior: 'smooth' });
                } else {
                    throw new Error('Invalid response format from Gemini API');
                }

            } catch (error) {
                console.error('Error:', error);
                alert(`Error generating code: ${error.message}`);
            } finally {
                // Reset button state
                generateBtn.disabled = false;
                generateBtn.innerHTML = '<i class="fas fa-magic"></i> Generate Code';
            }
        }

        // Copy Code Functionality
        copyBtn.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(codeOutputContent.textContent);
                copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                setTimeout(() => {
                    copyBtn.innerHTML = '<i class="fas fa-copy"></i> Copy';
                }, 2000);
            } catch (err) {
                console.error('Failed to copy: ', err);
                // Fallback for older browsers
                const textArea = document.createElement('textarea');
                textArea.value = codeOutputContent.textContent;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                
                copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                setTimeout(() => {
                    copyBtn.innerHTML = '<i class="fas fa-copy"></i> Copy';
                }, 2000);
            }
        });

        // Initialize syntax highlighting
        document.addEventListener('DOMContentLoaded', () => {
            hljs.highlightAll();
        });

        // Auto-resize textarea
        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        codeInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        // Welcome message
        console.log('🚀 Gemini Pro AI Chat Application Loaded Successfully!');
        console.log('💡 Features: Chat Mode, Code Generation, Markdown Support, Syntax Highlighting');
        console.log('🔑 API Key: Configured and Ready');
    </script>
</body>
</html>
